name: CI Node Simples

on:
  push:
    branches: ["main"]

jobs:
  validar:

    runs-on: ubuntu-latest

    steps:

      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
        node-version: 25

      - name: Instalar dependências
        run: npm install

      - name: Rodar testes
        run: npm test